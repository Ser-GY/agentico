# ═══════════════════════════════════════════════════════════════
# TMUX CONFIG FOR MULTI-AGENT CLAUDE CODE
# Copy to ~/.tmux.conf
# ═══════════════════════════════════════════════════════════════

# Use Ctrl+a as prefix (easier than default Ctrl+b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Enable mouse support (click to switch panes/windows, scroll)
set -g mouse on

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Better colors
set -g default-terminal "screen-256color"

# Status bar styling
set -g status-style 'bg=#1a1a2e fg=#eaeaea'
set -g status-left '#[fg=#00ff00,bold][#S] '
set -g status-left-length 30
set -g status-right '#[fg=#888888]%H:%M'
set -g window-status-current-style 'fg=#00ff00,bold'
set -g window-status-format ' #I:#W '
set -g window-status-current-format ' #I:#W '

# Easy window switching with Alt+number
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10

# Easy pane switching with Alt+arrows
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config with r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ═══════════════════════════════════════════════════════════════
# PLUGINS (optional - for session persistence)
# ═══════════════════════════════════════════════════════════════
# Install TPM first: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-save sessions every 15 minutes
set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'

# Restore pane contents
set -g @resurrect-capture-pane-contents 'on'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
